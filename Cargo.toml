[package]
name = "efr32-rail"
version = "0.1.5"
edition = "2024"
build = "build.rs"

categories = ["embedded", "no-std", "radio"]
description = "Radio abstraction for the EFR32MG22 (Mighty Gecko)"
keywords = ["arm", "cortex-m", "efm32", "efr32", "efr32mg22"]

authors = ["Bnyro <bnyro@tutanota.com>"]
license = "GPL-3.0-or-later"
readme = "README.md"
homepage = "https://github.com/bnyro/efr32-rail-rs"
repository = "https://github.com/bnyro/efr32-rail-rs"

[lib]
name = "efr32_rail"

[[bin]]
name = "trx_demo"
required-features = ["defmt-logging"]

[[bin]]
name = "rail_direct_access_demo"
required-features = ["defmt-logging"]

[dependencies]
cortex-m = { version = "0.7.7", features = ["critical-section-single-core"] }
cortex-m-rt = { version = "0.7.5", features = ["device"] }
# critical section feature is needed to call `Peripherals::take`
# rt is needed to be able to listen to interrupts
efr32mg22-pac = { version = "0.1.1", features = ["critical-section", "rt"] }

defmt = { version = "1.0", optional = true }
defmt-rtt = { version = "1.0", optional = true }

[build-dependencies]
bindgen = "0.72"
cc = "1.2"

[features]
# set logging levels here
default = []
defmt-logging = ["defmt", "defmt-rtt", "defmt-default"]

defmt-debug = []
# do NOT modify these features
defmt-default = []
defmt-error = []
defmt-info = []
defmt-trace = []
defmt-warn = []
